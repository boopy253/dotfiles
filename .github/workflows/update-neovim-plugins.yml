name: Update Neovim Plugins

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday UTC 3:00
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        run: brew install neovim

      - name: Update plugins
        run: |
          nvim --headless "+Lazy! update" +qa
        env:
          XDG_CONFIG_HOME: ${{ github.workspace }}/.config
          XDG_DATA_HOME: ${{ github.workspace }}/.local/share

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet .config/nvim/lazy-lock.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .config/nvim/lazy-lock.json
          git commit -m "chore(deps): update neovim plugins"
          git push
